<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Unified Dark Aesthetic Variables from image_5.png */
        :root {
            --bg-dark: #020617; /* Very dark background */
            --sidebar-dark: #0f172a; /* Slightly lighter slate for sidebar */
            --card-dark: #1e293b; /* Accent slate for task items */
            --text-main: #f8fafc; /* Near white text */
            --text-muted: #94a3b8; /* Faded slate text */
            --accent-purple: #c084fc; /* Neon purple accent */
        }

        /* Full page dark background with subtle purple glow */
        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(at 80% 20%, rgba(192, 132, 252, 0.05) 0px, transparent 50%);
            font-family: 'Segoe UI', Roboto, sans-serif; color: var(--text-main);
            display: flex; height: 100vh; margin: 0; overflow: hidden;
        }
        
        /* DARK Sidebar */
        .sidebar {
            width: 280px; background: var(--sidebar-dark); padding: 30px 20px;
            border-right: 1px solid rgba(255, 255, 255, 0.05); display: flex; flex-direction: column;
        }
        .sidebar-brand { color: var(--accent-purple); font-weight: 700; font-size: 1.5rem; margin-bottom: 40px; padding-left: 10px; }
        .sidebar-link {
            display: flex; align-items: center; padding: 12px; color: var(--text-muted);
            text-decoration: none; border-radius: 10px; margin-bottom: 8px; transition: 0.2s;
        }
        .sidebar-link:hover, .sidebar-link.active {
            background: rgba(192, 132, 252, 0.1); /* Subtle purple hover */
            color: var(--text-main);
        }
        .sidebar-link i { margin-right: 15px; width: 20px; text-align: center; }

        /* Main Content */
        .main-content { flex-grow: 1; padding: 50px; overflow-y: auto; }
        .page-header h2 { font-weight: 700; color: var(--text-main); }
        .page-header p { color: var(--text-muted); }
        
        /* DARK Task Items (Floating Slates) */
        .task-item {
            background: var(--card-dark);
            border: 1px solid rgba(255, 255, 255, 0.03); /* Nearly invisible border */
            border-radius: 16px; padding: 20px; margin-bottom: 15px;
            display: flex; align-items: center; transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .task-item:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.2); }
        
        /* Updated Checkbox (Purple accent) */
        .check-btn {
            width: 26px; height: 26px; border: 2px solid #475569; border-radius: 50%;
            margin-right: 20px; cursor: pointer; display: flex; align-items: center;
            justify-content: center; transition: 0.2s; color: transparent;
        }
        .check-btn:hover { border-color: var(--accent-purple); color: var(--accent-purple); }
        
        .task-info { flex-grow: 1; }
        .task-title { font-weight: 500; color: var(--text-main); margin: 0; font-size: 1.1rem; }
        .task-meta { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }
        .task-meta span { margin-right: 15px; }
        .task-meta i { margin-right: 5px; color: #64748b; }

        /* Completed State */
        .completed { opacity: 0.5; }
        .completed .task-title { text-decoration: line-through; color: var(--text-muted); }
        .completed .check-btn {
            background: #10b981; border-color: #10b981; color: white !important;
        }
    </style>
    <title>Hangarin | Dark Dashboard</title>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-brand">Hangarin</div>
        <a href="#" class="sidebar-link active"><i class="fas fa-sun"></i> My Day</a>
        <a href="#" class="sidebar-link"><i class="fas fa-star"></i> Important</a>
        <a href="#" class="sidebar-link"><i class="fas fa-calendar-alt"></i> Planned</a>
        <div style="margin-top: auto;">
            <hr style="border-color: rgba(255,255,255,0.05);">
            <a href="/admin" class="sidebar-link"><i class="fas fa-user-shield"></i> Admin Panel</a>
            <a href="/" class="sidebar-link text-danger"><i class="fas fa-sign-out-alt"></i> Exit</a>
        </div>
    </div>

    <div class="main-content">
        <div class="page-header mb-5">
            <h2>Good Morning, User</h2>
            <p>You have {{ tasks.count }} tasks listed for today.</p>
        </div>

        <div class="task-list">
            {% for task in tasks %}
            <div class="task-item {% if task.status == 'Completed' %}completed{% endif %}">
                <a href="{% url 'complete_task' task.id %}" class="check-btn">
                   {% if task.status == 'Completed' %}
                        <i class="fas fa-check"></i>
                   {% else %}
                        <i class="fas fa-check" style="opacity: 0;"></i>
                   {% endif %}
                </a>
                
                <div class="task-info">
                    <p class="task-title">{{ task.title }}</p>
                    <div class="task-meta">
                        <span><i class="far fa-folder"></i> {{ task.category.name }}</span>
                        <span><i class="far fa-calendar"></i> {{ task.deadline|date:"M d" }}</span>
                    </div>
                </div>

                <a href="{% url 'delete_task' task.id %}" class="btn btn-sm text-danger opacity-50 hover-opacity-100">
                    <i class="fas fa-trash-alt"></i>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
