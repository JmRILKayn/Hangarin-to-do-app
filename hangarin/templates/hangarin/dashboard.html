<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; }
        .task-card { border: none; border-radius: 12px; transition: 0.3s; border-left: 5px solid #2563eb; }
        .task-card:hover { transform: scale(1.02); }
        .navbar { background: #1e293b; }
    </style>
    <title>Hangarin Dashboard</title>
</head>
<body>
    <nav class="navbar navbar-dark p-3 mb-4">
        <div class="container d-flex justify-content-between">
            <span class="navbar-brand fw-bold"><i class="fas fa-layer-group"></i> My Dashboard</span>
            <div>
                <a href="/" class="btn btn-outline-light btn-sm me-2">Back Home</a>
                <a href="/admin" class="btn btn-primary btn-sm">Admin Login</a>
            </div>
        </div>
    </nav>

    <div class="d-flex align-items-center">
        <span class="text-light me-3 small">Hello, {{ user.username }}</span>
        <form method="post" action="{% url 'admin:logout' %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger btn-sm">Logout</button>
        </form>
    </div>

    <div class="container">
        <div class="row g-3">
            {% for task in tasks %}
            <div class="col-md-4">
                <div class="card task-card shadow-sm p-3">
                    <span class="badge bg-light text-primary mb-2 w-50">{{ task.category.name }}</span>
                    <h5 class="fw-bold">{{ task.title }}</h5>
                    <p class="text-muted small">{{ task.description|truncatechars:50 }}</p>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="text-info small"><i class="far fa-calendar-alt"></i> {{ task.deadline|date:"M d" }}</span>
                        <span class="badge {% if task.status == 'Completed' %}bg-success{% else %}bg-warning{% endif %}">{{ task.status }}</span>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
