<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Hangarin</title>
    <style>
        /* Base Styling & The Wave Background inspired by image_5.png */
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; }
        
        body {
            display: flex; justify-content: center; align-items: center; text-align: center;
            /* Creates the dark blue/black base and the two purple fluid waves */
            background-color: #020617;
            background-image: 
                /* Upper Wave */
                radial-gradient(at 50% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%),
                /* Bottom Wave */
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.08) 0px, transparent 50%),
                linear-gradient(180deg, #020617 0%, #0f172a 100%);
        }

        /* Glassmorphism Container - Resting on the waves */
        .container {
            background: rgba(30, 41, 59, 0.5); /* Semi-transparent dark slate */
            padding: 60px 40px; border-radius: 24px;
            backdrop-filter: blur(10px); /* The "Glass" blur effect */
            border: 1px solid rgba(255, 255, 255, 0.08); /* Faint border */
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            max-width: 500px; width: 90%;
        }

        h1 { font-size: 3rem; font-weight: 700; color: #f8fafc; margin-bottom: 10px; letter-spacing: -1px; }
        
        /* Neon Purple Accent Text */
        p { color: #a5b4fc; font-size: 1.1rem; max-width: 80%; margin: 0 auto 30px auto; opacity: 0.8; }

        /* Neon Button like the 'LEARN MORE' button in image_5.png */
        .btn {
            display: inline-block; padding: 12px 30px; font-weight: 600; text-decoration: none; border-radius: 30px;
            background: #9333ea; /* Solid purple */
            color: white; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(147, 51, 234, 0.5); /* Purple glow */
        }
        .btn:hover { background: #a855f7; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(147, 51, 234, 0.7); }
    </style>
</head>
<body>
    <div class="container">
        <h1>WELCOME</h1>
        <p>A simple way to organize your daily tasks, priorities, and notes.</p>
        <a href="/dashboard" class="btn">Go to Task Dashboard</a>
    </div>
</body>
</html>
