<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            background-color: #020617; /* Matches your home page */
            display: flex; justify-content: center; align-items: center; height: 100vh;
            font-family: sans-serif; color: white; margin: 0;
        }
        .login-card {
            background: rgba(30, 41, 59, 0.5);
            padding: 40px; border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 350px; text-align: center;
        }
        input {
            width: 100%; padding: 12px; margin: 10px 0;
            border-radius: 8px; border: 1px solid #334155;
            background: #1e293b; color: white; box-sizing: border-box;
        }
        .btn-login {
            background: #9333ea; color: white; border: none;
            padding: 12px; width: 100%; border-radius: 8px;
            cursor: pointer; font-weight: bold; margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Dashboard Login</h2>
        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn-login">Login to Dashboard</button>
        </form>
    </div>
</body>
</html>
